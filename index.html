
<html>

<head>
    <title>Moon Rover AI Simulator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .grid {
            display: inline-block;
            margin-top: 20px;
            user-select: none;
        }

        .row {
            display: flex;
        }

        .cell {
            width: 40px;
            height: 40px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            font-size: 20px;
            position: relative;
        }

        .start {
            background: lightgreen;
        }

        .goal {
            background: lightblue;
        }

        .obstacle {
            background: gray;
        }

        .path {
            background: yellow;
        }

        .controls {
            margin-top: 10px;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
        }

        .rover {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }
    </style>
</head>

<body>

    <h2>🌕 Moon Rover AI Simulator</h2>

    <div class="controls">
        <button onclick="runAStar()">Start Rover</button>
        <button onclick="clearObstacles()">Clear Obstacles</button>
        <button onclick="resetGrid()">Reset Grid</button>
        <p>🖱️ Click cells to add/remove obstacles</p>
    </div>

    <div id="grid" class="grid"></div>

    <script>
        let gridData = [
            ['S', '.', '.', '.', 'X'],
            ['X', 'X', '.', 'X', '.'],
            ['.', '.', '.', 'X', '.'],
            ['.', 'X', '.', '.', '.'],
            ['.', 'X', '.', 'X', 'G']
        ];

        const originalGrid = JSON.parse(JSON.stringify(gridData));

        const rows = gridData.length;
        const cols = gridData[0].length;

        let roverPosition = null;

        // REAL ROVER IMAGE (NASA-style)
        // Updated working rover image URL
        const roverImgSrc = "https://cdn-icons-png.flaticon.com/512/3212/3212608.png";

        function drawGrid(path = [], rover = null) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            for (let i = 0; i < rows; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';

                for (let j = 0; j < cols; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';

                    const val = gridData[i][j];

                    if (val === 'S') cell.classList.add('start');
                    if (val === 'G') cell.classList.add('goal');
                    if (val === 'X') cell.classList.add('obstacle');

                    if (path.some(p => p[0] === i && p[1] === j) && val === '.') {
                        cell.classList.add('path');
                    }

                    // ROVER IMAGE
                    if (rover && rover[0] === i && rover[1] === j) {
                        const img = document.createElement('img');
                        img.src = roverImgSrc;
                        img.className = 'rover';
                        cell.appendChild(img);
                    } else {
                        cell.innerText = val === '.' ? '' : val;
                    }

                    cell.onclick = () => toggleObstacle(i, j);

                    rowDiv.appendChild(cell);
                }
                grid.appendChild(rowDiv);
            }
        }

        function toggleObstacle(i, j) {
            if (gridData[i][j] === 'S' || gridData[i][j] === 'G') return;

            gridData[i][j] = gridData[i][j] === 'X' ? '.' : 'X';
            drawGrid();
        }

        function clearObstacles() {
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    if (gridData[i][j] === 'X') gridData[i][j] = '.';
                }
            }
            drawGrid();
        }

        function resetGrid() {
            gridData = JSON.parse(JSON.stringify(originalGrid));
            drawGrid();
        }

        function heuristic(a, b) {
            return Math.abs(a[0] - b[0]) + Math.abs(a[1] - b[1]);
        }

        function getNeighbors(node) {
            const dirs = [[0, 1], [1, 0], [0, -1], [-1, 0]];
            const neighbors = [];

            for (let d of dirs) {
                let r = node[0] + d[0];
                let c = node[1] + d[1];

                if (r >= 0 && r < rows && c >= 0 && c < cols && gridData[r][c] !== 'X') {
                    neighbors.push([r, c]);
                }
            }
            return neighbors;
        }

        function findPoints() {
            let start, goal;
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    if (gridData[i][j] === 'S') start = [i, j];
                    if (gridData[i][j] === 'G') goal = [i, j];
                }
            }
            return { start, goal };
        }

        async function runAStar() {
            const { start, goal } = findPoints();

            let open = [start];
            let cameFrom = {};
            let g = {};
            g[start] = 0;

            while (open.length > 0) {
                open.sort((a, b) => (g[a] + heuristic(a, goal)) - (g[b] + heuristic(b, goal)));
                let current = open.shift();

                if (current[0] === goal[0] && current[1] === goal[1]) {
                    let path = [];
                    let temp = current;

                    while (temp) {
                        path.push(temp);
                        temp = cameFrom[temp];
                    }

                    animateRover(path.reverse());
                    return;
                }

                for (let neighbor of getNeighbors(current)) {
                    let tempG = g[current] + 1;

                    if (!(neighbor in g) || tempG < g[neighbor]) {
                        g[neighbor] = tempG;
                        cameFrom[neighbor] = current;
                        open.push(neighbor);
                    }
                }
            }

            alert('No path found');
        }

        async function animateRover(path) {
            for (let i = 0; i < path.length; i++) {
                roverPosition = path[i];
                drawGrid(path.slice(0, i), roverPosition);
                await new Promise(r => setTimeout(r, 300));
            }
        }

        // Initial draw
        drawGrid();
    </script>

</body>

</html>
